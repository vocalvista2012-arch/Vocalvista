<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Place Order | VocalVista</title>
<link rel="icon" href="cvgy-removebg-preview.png" type="image/png">
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}
.container{
    max-width:700px;
    margin:40px auto;
    background:#1e293b;
    padding:30px;
    border-radius:15px;
}
h1{
    text-align:center;
    color:#8b5cf6;
}
input,textarea{
    width:100%;
    padding:12px;
    margin:10px 0 20px;
    border:none;
    border-radius:8px;
    font-size:16px;
}
button{
    width:100%;
    padding:15px;
    background:#8b5cf6;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
}
button:hover{
    background:#6d28d9;
}
</style>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>    
</head>

<body>

<div class="container">

<h1>Place Your Order</h1>

<label>Service</label>
<input type="text" id="service" readonly>

<label>Your Name</label>
<input type="text" id="name" placeholder="Enter your name">

<label>Phone Number</label>
<input type="text" id="phone" placeholder="Enter phone number">

<label>Describe Your Project</label>
<textarea id="description" rows="6" placeholder="Tell us what you need..."></textarea>
<label>Upload Your Project Files</label>

<input
    type="file"
    id="projectFile"
    accept=".jpg,.jpeg,.png,.webp,.mp4,.mov,.avi,.mkv,.zip,.rar"
    multiple>

<div class="cf-turnstile"
     data-sitekey="0x4AAAAAAD36j7xfA2rQ0_1E">
</div>

<button id="submitBtn">Submit Order</button>

</div>

<script>
const params = new URLSearchParams(window.location.search);
document.getElementById("service").value =
params.get("service") || "";
</script>
<script type="module" src="placeorder.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>    
</body>
</html>
