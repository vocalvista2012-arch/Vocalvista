<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vista Coin Hunt | VocalVista</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>

<style>
body{
    margin:0;
    background:#0b1020;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#title{
    position:absolute;
    top:15px;
    width:100%;
    text-align:center;
    color:white;
    font-size:28px;
    font-weight:bold;
    z-index:10;
}

#back{
    position:absolute;
    top:15px;
    left:15px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    z-index:10;
}

canvas{
    display:block;
    margin:auto;
}
</style>
</head>

<body>

<button id="back" onclick="location.href='dashboard.html'">⬅ Dashboard</button>

<div id="title">
🎮 Vista Coin Hunt
</div>

<script>

const config={
    type:Phaser.AUTO,
    width:1000,
    height:600,
    backgroundColor:"#6ec6ff",

    physics:{
        default:"arcade",
        arcade:{
            debug:false
        }
    },

    scene:{
        preload:preload,
        create:create,
        update:update
    }
};

new Phaser.Game(config);

let player;
let cursors;
let coins;
let score=0;
let scoreText;

function preload(){}

function create(){

player=this.add.rectangle(500,300,40,40,0x2563eb);
this.physics.add.existing(player);

player.body.setCollideWorldBounds(true);

coins=this.physics.add.group();

for(let i=0;i<20;i++){

let coin=this.add.circle(

Phaser.Math.Between(40,960),
Phaser.Math.Between(40,560),
10,
0xffd700

);

this.physics.add.existing(coin);

coins.add(coin);

}

this.physics.add.overlap(
player,
coins,
collectCoin,
null,
this
);

scoreText=this.add.text(
20,
20,
"Coins: 0",
{
fontSize:"28px",
color:"#000"
}
);

cursors=this.input.keyboard.createCursorKeys();

}

function update(){

player.body.setVelocity(0);

if(cursors.left.isDown)
player.body.setVelocityX(-250);

if(cursors.right.isDown)
player.body.setVelocityX(250);

if(cursors.up.isDown)
player.body.setVelocityY(-250);

if(cursors.down.isDown)
player.body.setVelocityY(250);

}

function collectCoin(player,coin){

coin.destroy();

score++;

scoreText.setText("Coins: "+score);

if(score==20){

alert("🏆 Congratulations!\nYou collected all Vista Coins!");

location.reload();

}

}

</script>

</body>
</html>
