<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Orders | VocalVista</title>
<link rel="icon" href="cvgy-removebg-preview.png" type="image/png">
<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

header{
    background:#1e293b;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:900px;
    margin:30px auto;
}


.order-card{
    background:#1e293b;
    padding:20px;
    margin-bottom:20px;
    border-radius:15px;
    border:1px solid #334155;
}


.status{
    color:#22c55e;
    font-weight:bold;
}


button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
}


.no-order{
    text-align:center;
    color:#94a3b8;
    margin-top:50px;
}

</style>

</head>


<body>


<header>
<h1>📦 My Orders</h1>
</header>


<div class="container" id="ordersBox">

<p>Loading orders...</p>

</div>



<script type="module">


import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import { getAuth,onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";


import { getFirestore,collection,query,where,getDocs }
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";



// 🔥 ADD YOUR FIREBASE CONFIG HERE

const firebaseConfig = {

apiKey: "AIzaSyDgyxk97l7CTsmgGADDvJ8jhiN6Df7WRwQ",

authDomain: "vocalvista-fb898.firebaseapp.com",

projectId: "vocalvista-fb898",

storageBucket: "vocalvista-fb898.firebasestorage.app",

messagingSenderId: "89615036410",

appId: "1:89615036410:web:e50666f37f7416cbc8be43"

};



const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);



const ordersBox = document.getElementById("ordersBox");



onAuthStateChanged(auth, async(user)=>{


if(user){


const q = query(

collection(db,"orders"),

where("userId","==",user.uid)

);



const snapshot = await getDocs(q);



ordersBox.innerHTML="";



if(snapshot.empty){


ordersBox.innerHTML = `

<div class="no-order">

<h2>No Orders Found</h2>

<p>You have not placed any order yet.</p>

</div>

`;

return;

}




snapshot.forEach((doc)=>{


let order = doc.data();



ordersBox.innerHTML += `


<div class="order-card">


<h2>🎨 ${order.service}</h2>


<p>
Order ID: ${doc.id}
</p>


<p>
Status:
<span class="status">
${order.status || "Pending"}
</span>
</p>



${order.fileURL ? 
`
<a href="${order.fileURL}" target="_blank">
<button>Download File</button>
</a>
`
:
""}


</div>


`;



});



}
else{


ordersBox.innerHTML=`

<div class="no-order">

<h2>Please Login First</h2>

</div>

`;

}



});



</script>


</body>
</html>
