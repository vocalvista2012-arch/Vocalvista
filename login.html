<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VocalVista | Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#7c3aed);
}

.login-box{

width:380px;
background:#111827;
padding:40px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,.5);

}

h1{

text-align:center;
color:white;
margin-bottom:10px;

}

p{

text-align:center;
color:#94a3b8;
margin-bottom:30px;

}

input{

width:100%;
padding:15px;
margin-bottom:18px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
font-size:16px;

}

button{

width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;

}

button:hover{

background:#1d4ed8;

}

#message{

margin-top:20px;
text-align:center;
color:#22c55e;

}

.signup{

margin-top:25px;
text-align:center;

}

.signup a{

color:#60a5fa;
text-decoration:none;

}

</style>

</head>

<body>

<div class="login-box">

<h1>🎵 VocalVista</h1>

<p>Customer Login</p>

<input
type="email"
id="email"
placeholder="Enter Email">

<input
type="password"
id="password"
placeholder="Enter Password">

<button id="loginBtn">

Login

</button>

<div id="message"></div>

<div class="signup">

Don't have an account?

<br><br>

<a href="signup.html">

Create Account

</a>

</div>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
