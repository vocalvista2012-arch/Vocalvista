<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VocalVista | Customer Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b1120;
color:white;
}

header{
background:#111827;
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,.4);
}

header h2{
color:#7c5cff;
}

.logout-btn{
background:#ef4444;
color:white;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

.container{
max-width:1200px;
margin:40px auto;
padding:20px;
}

.welcome{
background:linear-gradient(135deg,#2563eb,#7c3aed);
padding:35px;
border-radius:18px;
margin-bottom:30px;
}

.welcome h1{
font-size:32px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:15px;
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card h3{
margin-bottom:10px;
color:#60a5fa;
}

.big{
font-size:30px;
font-weight:bold;
}

.orders{
background:#1e293b;
padding:25px;
border-radius:15px;
}

.order{
background:#0f172a;
padding:18px;
margin-top:15px;
border-radius:10px;
border-left:5px solid #7c3aed;
}

.status{
color:#22c55e;
font-weight:bold;
}

.buttons{
margin-top:30px;
display:flex;
gap:15px;
flex-wrap:wrap;
}

.btn{
background:#2563eb;
color:white;
padding:14px 22px;
text-decoration:none;
border-radius:10px;
}

.btn:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<header>

<h2>🎵 VocalVista Dashboard</h2>

<button class="logout-btn" id="logoutBtn">
Logout
</button>

</header>

<div class="container">

<div class="welcome">

<h1>Welcome 👋</h1>

<p id="userEmail">Loading...</p>

</div>

<div class="grid">

<div class="card">

<h3>Total Orders</h3>

<div class="big">0</div>

</div>

<div class="card">

<h3>Completed</h3>

<div class="big">0</div>

</div>

<div class="card">

<h3>Pending</h3>

<div class="big">0</div>

</div>

<div class="card">

<h3>Coupon</h3>

<div class="big">Available</div>

</div>

</div>

<div class="orders">

<h2>📦 My Orders</h2>

<div class="order">

<h3>No Orders Yet</h3>

<p>Your future VocalVista orders will appear here.</p>

<p class="status">Status : Ready to Order</p>

</div>

<div class="buttons">

<a href="order.html" class="btn">➕ New Order</a>

<a href="index.html" class="btn">🏠 Home</a>

<a href="index.html#contact" class="btn">📞 Contact</a>
<button onclick="window.location.href='game.html'" class="btn">
    🎮 Game
</button>
  <button onclick="window.location.href='game.html'">🎮 Game</button>
</div>

</div>

</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
