<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VocalVista | Sign Up</title>
<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#1e293b;
    padding:35px;
    border-radius:15px;
    width:350px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

h1{
    color:#38bdf8;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#38bdf8;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0ea5e9;
}

a{
    color:#38bdf8;
}
</style>

</head>

<body>

<div class="container">

<h1>VocalVista</h1>

<h3>Create Account</h3>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button id="signupBtn">Create Account</button>

<p>
Already have an account?
<a href="login.html">Login</a>
</p>

<p id="message"></p>

</div>

<script type="module" src="signup.js"></script>

</body>
</html>
