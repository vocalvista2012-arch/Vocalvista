<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VocalVista Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:#111827;
padding:20px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.3);
}

header h1{
color:#8b5cf6;
}

.container{
max-width:1200px;
margin:40px auto;
padding:20px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:40px;
}

.stat-box{
background:#1e293b;
padding:25px;
border-radius:15px;
text-align:center;
}

.stat-box h2{
font-size:40px;
color:#8b5cf6;
}

.orders{
display:flex;
flex-direction:column;
gap:20px;
}

.order-card{
background:#1e293b;
padding:20px;
border-radius:15px;
border-left:6px solid #8b5cf6;
}

.order-card h3{
margin-bottom:10px;
}

.order-card p{
margin:8px 0;
color:#cbd5e1;
}

.status{
display:inline-block;
padding:6px 12px;
border-radius:8px;
background:orange;
color:white;
font-weight:bold;
}

.buttons{
margin-top:20px;
display:flex;
flex-wrap:wrap;
gap:10px;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
font-weight:bold;
}

.accept{
background:#3b82f6;
}

.progress{
background:#f59e0b;
}

.complete{
background:#22c55e;
}

.delete{
background:#ef4444;
}

input{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
}

.save{
margin-top:10px;
background:#8b5cf6;
}

</style>

</head>

<body>

<header>

<h1>🎵 VocalVista Admin Dashboard</h1>

</header>

<div class="container">

<div class="stats">

<div class="stat-box">
<h2 id="totalOrders">0</h2>
<p>Total Orders</p>
</div>

<div class="stat-box">
<h2 id="pendingOrders">0</h2>
<p>Pending</p>
</div>

<div class="stat-box">
<h2 id="completedOrders">0</h2>
<p>Completed</p>
</div>

</div>

<div class="orders" id="ordersContainer">

<!-- Orders from Firebase will appear here -->

<div class="order-card">

<h3>Sample Order</h3>

<p><strong>Customer:</strong> Rahul</p>

<p><strong>Email:</strong> rahul@gmail.com</p>

<p><strong>Phone:</strong> 9876543210</p>

<p><strong>Service:</strong> Video Editing</p>

<p><strong>Description:</strong> Edit my YouTube Shorts.</p>

<p>Status:
<span class="status">
Pending
</span>
</p>

<input
type="text"
placeholder="Paste Delivery Link">

<div class="buttons">

<button class="accept">
Accept
</button>

<button class="progress">
In Progress
</button>

<button class="complete">
Completed
</button>

<button class="delete">
Delete
</button>

<button class="save">
Save Delivery Link
</button>

</div>

</div>

</div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
