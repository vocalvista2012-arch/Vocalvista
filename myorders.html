<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | VocalVista</title>

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#111827;
            color:white;
        }

        header{
            background:#1f2937;
            padding:15px;
            text-align:center;
        }

        .container{
            width:90%;
            max-width:900px;
            margin:30px auto;
        }

        .order-card{
            background:#1e293b;
            border-radius:12px;
            padding:20px;
            margin-bottom:20px;
            border:1px solid #374151;
        }

        .status{
            color:#22c55e;
            font-weight:bold;
        }

        button{
            background:#3b82f6;
            color:white;
            border:none;
            padding:10px 18px;
            border-radius:8px;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            background:#2563eb;
        }
    </style>
</head>
<body>

<header>
    <h1>📦 My Orders</h1>
</header>

<div class="container">

    <div class="order-card">
        <h2>Logo Design</h2>

        <p>Status:
            <span class="status">
                In Progress
            </span>
        </p>

        <p>Order ID: #1001</p>

        <button disabled>
            Leave Review
        </button>

    </div>

</div>

</body>
</html>
